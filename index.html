<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bitwise Pixel Lab</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="app">
    <header class="top card">
      <h1>Bitwise Pixel Lab</h1>
      <p>واجهة تعليمية مبسطة لشرح العمليات البتّية بشكل احترافي وواضح.</p>

      <div class="toolbar">
        <div class="control-group selects">
          <label class="field">
            <span>حجم الشبكة</span>
            <select id="gridSize">
              <option value="16">16x16</option>
              <option value="32">32x32</option>
            </select>
          </label>

          <label class="field">
            <span>نوع العملية</span>
            <select id="operationSelect">
              <option value="AND">AND</option>
              <option value="OR">OR</option>
              <option value="XOR">XOR</option>
              <option value="NOT">NOT</option>
            </select>
          </label>
        </div>

        <div class="control-group actions">
          <button id="applyBtn" class="primary">تطبيق العملية</button>
          <button id="clearBtn">مسح الكل</button>
          <button id="copyAToB">نسخ A إلى B</button>
        </div>
      </div>

      <div class="mini-tools">
        <label class="field compact">
          <span>التطبيق على</span>
          <select id="shapeTarget">
            <option value="A">Grid A</option>
            <option value="B">Grid B</option>
          </select>
        </label>
        <span class="mini-title">أشكال سريعة</span>
        <button class="shape-btn" data-shape="square">Square</button>
        <button class="shape-btn" data-shape="circle">Circle</button>
        <button class="shape-btn" data-shape="diagonal">Diagonal</button>
      </div>

      <div class="meta-row">
        <div class="hint" id="operatorHint">AND: 1 فقط إذا كانت القيمتان 1</div>
        <label class="check-card" for="toggleNumbers">
          <input type="checkbox" id="toggleNumbers" checked>
          <span class="check-icon" aria-hidden="true"></span>
          <span>إظهار الأرقام داخل البكسلات (0/1)</span>
        </label>
      </div>
      <p id="statusBar" class="status" aria-live="polite"></p>
    </header>

    <section class="boards">
      <article class="board card">
        <h2>Grid A</h2>
        <div id="gridA" class="pixel-grid"></div>
        <div class="board-actions">
          <button data-action="invert" data-grid="A">عكس A</button>
          <button data-action="reset" data-grid="A">مسح A</button>
        </div>
      </article>

      <article class="board card">
        <h2>Grid B</h2>
        <div id="gridB" class="pixel-grid"></div>
        <div class="board-actions">
          <button data-action="invert" data-grid="B">عكس B</button>
          <button data-action="reset" data-grid="B">مسح B</button>
        </div>
      </article>

      <article class="board card">
        <h2>Result</h2>
        <div id="gridR" class="pixel-grid"></div>
        <div class="board-actions">
          <button id="exportPngR">تصدير PNG</button>
          <button data-action="reset" data-grid="R">مسح الناتج</button>
        </div>
      </article>
    </section>

    <div id="traceTooltip" class="trace"></div>

    <footer class="footer">
      <a href="https://www.linkedin.com/in/osamaaothman" target="_blank" rel="noopener noreferrer">
        Built by Osama Othman
      </a>
    </footer>
  </main>

  <script src="script.js"></script>
</body>
</html>
